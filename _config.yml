# GitHub Pages site configuration — Minjae Lee
title: Minjae Lee
description: "M.S. in Computer Science and Engineering · APEX Lab, Gyeongsang National University"
lang: en

# Apply the custom layout to every page even if it omits explicit front matter.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Each file in _projects/ is one project card on the Projects page.
collections:
  projects:
    output: false

# CV LaTeX sources are kept for version control but not served.
exclude:
  - cv-src
