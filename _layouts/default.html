<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">Minjae Lee</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} class="active"{% endif %}>About</a>
        <a href="{{ '/publications.html' | relative_url }}"{% if page.url contains 'publications' %} class="active"{% endif %}>Publications</a>
        <a href="{{ '/projects.html' | relative_url }}"{% if page.url contains 'projects' %} class="active"{% endif %}>Projects</a>
        <a href="{{ '/cv.html' | relative_url }}"{% if page.url contains 'cv' %} class="active"{% endif %}>CV</a>
      </nav>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <script>
    // Assemble email buttons at runtime so the raw address never sits in
    // the static HTML (light anti-harvesting). No-JS visitors still see the
    // obfuscated "[at] / [dot]" fallback text.
    (function () {
      var btns = document.querySelectorAll('.email-btn[data-user]');
      for (var i = 0; i < btns.length; i++) {
        var el = btns[i];
        var addr = el.getAttribute('data-user') + '@' + el.getAttribute('data-domain');
        el.setAttribute('href', 'mailto:' + addr);
        var out = el.querySelector('.addr');
        if (out) out.textContent = addr;
      }
    })();
  </script>
</body>
</html>
