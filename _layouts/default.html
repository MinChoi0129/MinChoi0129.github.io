<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">Minjae Lee</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} class="active"{% endif %}>About</a>
        <a href="{{ '/publications.html' | relative_url }}"{% if page.url contains 'publications' %} class="active"{% endif %}>Publications</a>
        <a href="{{ '/projects.html' | relative_url }}"{% if page.url contains 'projects' %} class="active"{% endif %}>Projects</a>
        <a href="{{ '/cv.html' | relative_url }}"{% if page.url contains 'cv' %} class="active"{% endif %}>CV</a>
      </nav>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>
</body>
</html>
