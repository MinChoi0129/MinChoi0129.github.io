<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <script>
    // Apply saved language before paint (default: English) to avoid a flash.
    (function () {
      var l; try { l = localStorage.getItem('site-lang'); } catch (e) {}
      document.documentElement.setAttribute('data-lang', l === 'ko' ? 'ko' : 'en');
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}"><span class="lang-en">Minjae Lee</span><span class="lang-ko">이민재</span></a>
      <div class="header-right">
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} class="active"{% endif %}><span class="lang-en">About</span><span class="lang-ko">소개</span></a>
          <a href="{{ '/publications.html' | relative_url }}"{% if page.url contains 'publications' %} class="active"{% endif %}><span class="lang-en">Publications</span><span class="lang-ko">논문</span></a>
          <a href="{{ '/projects.html' | relative_url }}"{% if page.url contains 'projects' %} class="active"{% endif %}><span class="lang-en">Projects</span><span class="lang-ko">프로젝트</span></a>
          <a href="{{ '/cv.html' | relative_url }}"{% if page.url contains 'cv' %} class="active"{% endif %}>CV</a>
        </nav>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" class="lang-opt" data-set-lang="en">EN</button>
          <button type="button" class="lang-opt" data-set-lang="ko">한</button>
        </div>
      </div>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <script>
    (function () {
      // Build the mailto at runtime; keep the [at]/[dot] display text as-is.
      var btns = document.querySelectorAll('.email-btn[data-user]');
      for (var i = 0; i < btns.length; i++) {
        var el = btns[i];
        el.setAttribute('href', 'mailto:' + el.getAttribute('data-user') + '@' + el.getAttribute('data-domain'));
      }
      // Language switch (persisted; default English).
      var root = document.documentElement;
      var opts = document.querySelectorAll('[data-set-lang]');
      for (var j = 0; j < opts.length; j++) {
        opts[j].addEventListener('click', function () {
          var l = this.getAttribute('data-set-lang');
          root.setAttribute('data-lang', l);
          try { localStorage.setItem('site-lang', l); } catch (e) {}
        });
      }
    })();
  </script>
</body>
</html>
